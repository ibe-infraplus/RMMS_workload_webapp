version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: workload_backend
    restart: always
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: workload_frontend
    restart: always
    ports:
      - "8010:80"
    depends_on:
      - backend
